<footer class="bg-slate-900 text-slate-300 py-12 mt-auto" role="contentinfo">
  <div class="container mx-auto px-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
      
      <!-- Brand Section -->
      <div>
        <h3 class="text-xl font-bold text-white mb-4">DevPortfolio</h3>
        <p class="text-slate-400">
          Crafting high-performance web applications with modern architecture and accessible design.
        </p>
      </div>

      <!-- Navigation Section -->
      <div>
        <h4 class="text-lg font-semibold text-white mb-4">Navigation</h4>
        <nav aria-label="Footer Navigation">
          <ul class="space-y-2">
            <li>
              <a [routerLink]="['/']" class="hover:text-white transition-colors focus:underline">
                Home
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- Connect Section -->
      <div>
        <h4 class="text-lg font-semibold text-white mb-4">Connect</h4>
        <ul class="space-y-2 flex flex-col md:items-start items-center">
          @for (link of socialLinks; track link.name) &#123;
            <li>
              <a 
                [href]="link.url" 
                target="_blank" 
                rel="noopener noreferrer" 
                class="flex items-center gap-2 hover:text-white transition-colors focus:underline"
                [attr.aria-label]="link.name"
              >
                <i class="pi {{ link.icon }}"></i>
                <span>{{ link.name }}</span>
              </a>
            </li>
          &#125;
        </ul>
      </div>
    </div>

    <div class="border-t border-slate-800 mt-8 pt-8 text-center text-slate-500 text-sm">
      <p>&copy; {{ currentYear }} DevPortfolio. All rights reserved.</p>
    </div>
  </div>
</footer>
